<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Arwen 開團購物</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Noto Sans TC", sans-serif; background: #f3f3f3; margin: 0; padding: 0; }
    #lookup-wrapper { text-align:center; padding: 25px 15px 10px; }
    #lookup-wrapper input { width:240px; padding:10px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
    #lookup-wrapper button { margin-left:8px; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(45deg,#6e46ae,#d7a9f9); color:#fff; font-size:16px; }
    #lookup-message { margin-top:12px; font-size:15px; }
    .product-wrapper { display: flex; justify-content: center; flex-wrap: wrap; gap: 40px; }
    .product-card { margin-top: 30px; background: #fff; padding: 20px; border-radius: 10px; border: 1.5px solid #ccc; text-align: center; width: 250px; }
    .product-card img { width: 200px; height: 200px; object-fit: cover; border-radius: 8px; background:#eee; }
    .product-title { font-size: 20px; font-weight: bold; margin: 20px 0; }
    .member-row { display:flex; justify-content:center; align-items:center; margin-top:6px; gap:6px; }
    .member-name { width:90px; text-align:right; }
    .qty-input { width:50px; text-align:center; border:1px solid #ccc; border-radius:6px; }
    .total { font-size: 25px; font-weight: bold; text-align: center; margin: 30px 0; }
    .submit-btn { background: linear-gradient(45deg,#6e46ae,#d7a9f9); color:#fff; font-size:16px; padding:10px 30px; border:none; border-radius:8px; cursor:pointer; margin-top:20px; }
    #order-summary-text { font-weight:300; font-size:16px; line-height:1.6; text-align:center; }
    #checkout-section { margin-top:30px; padding:20px; border-top:2px dashed #ccc; max-width:500px; margin-left:auto; margin-right:auto; }
    .payment-notice { background:#a798bd; color:#fff; padding:5px; border-radius:10px; text-align:center; line-height:1.4; margin-bottom:30px; font-size:15px; }
    .form-group { margin-top:15px; }
    .form-group input,.form-group select { box-sizing:border-box; width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; margin-top:5px; }
  </style>
</head>

<body>
  <!-- ===== 訂單查詢 ===== -->
  <div id="lookup-wrapper">
    <input id="social-name" type="text" placeholder="輸入社群名字查詢訂單" />
    <button onclick="lookupOrder()">查詢</button>
    <div id="lookup-message"></div>
  </div>

  <!-- ===== 商品卡片 ===== -->
  <div class="product-wrapper">
    <div class="product-card" data-key="POS" data-price="900">
      <img src="../image/LEMONADE/pos.webp" alt="POS">
      <div class="product-title">POS版 - $900</div>
    </div>

    <div class="product-card" data-key="ACID" data-price="1340">
      <img src="../image/LEMONADE/acid.webp" alt="ACID">
      <div class="product-title">ACID版 - $1340</div>
    </div>

    <div class="product-card" data-key="LEMONADE" data-price="1340">
      <img src="../image/LEMONADE/lemonade.webp" alt="LEMONADE">
      <div class="product-title">LEMONADE - $1340</div>
    </div>
  </div>

  <!-- ===== 總金額與結帳按鈕 ===== -->
  <div class="total">總金額：<span id="total-price">$0</span></div>
  <div style="text-align:center;">
    <button class="submit-btn" onclick="showCheckout()">結帳</button>
  </div>

  <!-- ===== 結帳區塊 ===== -->
  <div id="checkout-section" style="display:none;">
    <div class="total" id="order-summary-text"></div>
    <div class="payment-notice" id="payment-status-notice" style="display:none;"></div>

    <div class="form-group">
      <label for="email">*Gmail信箱（系統自動補上 @gmail.com）</label>
      <input type="text" id="email" placeholder="xxxxx">
    </div>

    <div class="form-group">
      <label for="bank">匯款銀行+末五碼</label>
      <input type="text" id="bank" required>
    </div>

    <div class="form-group">
      <label for="name">*社群內您的姓名</label>
      <input type="text" id="name">
    </div>

    <div class="form-group">
      <label for="amount">*匯款/無卡金額</label>
      <input type="text" id="amount">
    </div>

    <div class="form-group">
      <label for="agree">*是否同意購買須知</label>
      <select id="agree">
        <option value="">請選擇</option>
        <option value="是">是</option>
      </select>
    </div>

    <div style="text-align:center;">
      <button class="submit-btn" onclick="submitOrder()">送出訂單</button>
    </div>
  </div>

<script>
/* ===== 商品設定 ===== */
const PRODUCTS = [
  { key: "POS", label: "POS版", price: 900 },
  { key: "ACID", label: "ACID版", price: 1340 },
  { key: "LEMONADE", label: "LEMONADE", price: 1340 }
];

/* ===== 資料庫 ===== */
const ORDER_DB = {
  "Arwen": { paid:false, POS:1, ACID:0, LEMONADE:0 },
  "lianchen038521": { paid:false, POS:2, ACID:1, LEMONADE:2 },
  "mandu":          { paid:false, POS:2, ACID:0, LEMONADE:0 },
  "Jack":           { paid:false, POS:1, ACID:1, LEMONADE:1 },
  "yy":             { paid:false, POS:1, ACID:0, LEMONADE:0 },
  "K":             { paid:false, POS:1, ACID:0, LEMONADE:0 },
  "Liii":           { paid:false, POS:1, ACID:0, LEMONADE:2 },
  "cuuuuu":         { paid:false, POS:0, ACID:1, LEMONADE:1 },
  "수수":            { paid:false, POS:0, ACID:1, LEMONADE:0 },
  "Eunice":         { paid:false, POS:0, ACID:1, LEMONADE:0 },
  "Alex":           { paid:false, POS:0, ACID:0, LEMONADE:1 },
  "Xavier":         { paid:false, POS:0, ACID:0, LEMONADE:1 },
  "Leon":         { paid:false, POS:0, ACID:1, LEMONADE:0 },
  "Chenhann":         { paid:false, POS:0, ACID:1, LEMONADE:0 },
  "kaii":         { paid:false, POS:0, ACID:1, LEMONADE:0 }
};

/* ===== 全域狀態 ===== */
let currentOrder = null;
let paymentStatus = null;

/* ===== 查詢訂單 ===== */
function lookupOrder() {
  const name = document.getElementById("social-name").value.trim();
  const msg  = document.getElementById("lookup-message");
  const cards = document.querySelectorAll(".product-card");

  cards.forEach(card => {
    card.querySelectorAll(".member-row").forEach(e => e.remove());
  });

  const order = ORDER_DB[name];
  currentOrder = order || null;

  document.getElementById("checkout-section").style.display = "none";

  if (!order) {
    msg.innerText = "❌ 查無此社群名字，請確認是否有喊單！";
    msg.style.color = "#e74c3c";
    document.getElementById("total-price").innerText = "$0";
    return;
  }

  paymentStatus = order.paid;

  let total = 0;

  PRODUCTS.forEach(product => {
    const qty = order[product.key] || 0;
    total += qty * product.price;

    if (qty > 0) {
      const card = document.querySelector(`.product-card[data-key="${product.key}"]`);
      const row = document.createElement("div");
      row.className = "member-row";
      row.innerHTML = `
        <span class="member-name">${product.label}</span>
        <input class="qty-input" type="number" value="${qty}" readonly>
      `;
      card.appendChild(row);
    }
  });

  document.getElementById("total-price").innerText = `$${total}`;

  msg.style.color = paymentStatus ? "#27ae60" : "#e67e22";
  msg.innerText = paymentStatus
    ? "✅ 已確認匯款，可按『結帳』填表！"
    : "⚠️ 尚未對帳成功，請核對品項後按結帳並填寫匯款資料";
}

/* ===== 顯示結帳表單 ===== */
function showCheckout() {
  if (!currentOrder) {
    alert("請先查詢社群名字或確認是否有訂單！");
    return;
  }

  const lines = PRODUCTS
    .filter(p => (currentOrder[p.key] || 0) > 0)
    .map(p => `${p.label} x${currentOrder[p.key]}`);

  if (lines.length === 0) {
    alert("訂單內沒有商品數量，請確認！");
    return;
  }

  document.getElementById("order-summary-text").innerHTML =
    `<strong>您的購買明細：</strong><br><br>${lines.join("<br>")}`;

  const notice = document.getElementById("payment-status-notice");

  if (notice) {
    notice.style.display = "block";

    if (paymentStatus) {
      notice.innerHTML = `
        <p>✅ 系統已對帳成功，您可以完成下單。</p>
      `;
    } else {
      notice.innerHTML = `
        <p>⚠️ 尚未完成匯款或對帳，請確認後送出表單。</p>
        <p>💰付款須知 - 匯款帳號:</p>
        <p>請勿備註任何字符！會對不到帳</p>
        <p><strong><span style="color:#a33225;">請注意匯款銀行是郵局!!!!!</span></strong></p>
        <p>（700）00310710953998</p>
        <p>請先完成付款後再送出表單</p>
        <p>若未收到款項，將不列入此次訂單。</p>
      `;
    }
  }

  // 自動帶入名字
  const queryName = document.getElementById("social-name")?.value.trim();
  const nameInput = document.getElementById("name");
  nameInput.value = queryName;
  nameInput.readOnly = true;

  const totalAmount = document.getElementById("total-price").innerText.replace("$", "");
  document.getElementById("amount").value = totalAmount;

  document.getElementById("checkout-section").style.display = "block";
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

/* ===== 送出表單 ===== */
function submitOrder() {
  if (!currentOrder) {
    alert("請先查詢訂單！");
    return;
  }

  let emailVal = document.getElementById("email").value.trim();
  if (emailVal && !emailVal.endsWith("@gmail.com")) {
    emailVal += "@gmail.com";
  }

  const name   = document.getElementById("name").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const bank=document.getElementById("bank").value.trim();
  const agree  = document.getElementById("agree").value;
  const total  = document.getElementById("total-price").innerText.replace("$", "");

  if (!emailVal || !name || !amount || !agree) {
    alert("請填寫所有 * 必填欄位！");
    return;
  }

  const qtys = {
    POS: currentOrder.POS || 0,
    ACID: currentOrder.ACID || 0,
    LEMONADE: currentOrder.LEMONADE || 0
  };

  localStorage.setItem("savedEmail", document.getElementById("email").value);

  const postData = {
    "entry.1966657025": qtys.POS,
    "entry.1263239589": qtys.ACID,
    "entry.959007677": qtys.LEMONADE,

    "entry.1793387795": emailVal,
    "entry.398219589": name,
    "entry.1866660785": amount,
    "entry.1174194777": agree,
    "entry.385310176": bank,
    "entry.328979395": total
  };

  fetch("https://docs.google.com/forms/d/10tBJ9diH_bMHb7hkptgiUlCfcVklCmj19X2l3TpnBFw/formResponse", {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams(postData).toString()
  })
  .then(() => window.location.href = "../other/done.html")
  .catch(() => window.location.href = "../other/error.html");
}

/* ===== 頁面載入時：自動填入 localStorage 資料 ===== */
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("email").value =
    localStorage.getItem("savedEmail") || "";
});
</script>
</body>
</html>
